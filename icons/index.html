<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schmerztagebuch & Gesundheitstracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Gesundheits-Tracker</h1>
  </header>

  <nav class="nav-bar">
    <div class="nav-links">
      <a href="#" class="nav-tab active" data-tab="diary">Schmerztagebuch</a>
      <a href="#" class="nav-tab" data-tab="medication">Medikamente</a>
      <a href="#" class="nav-tab" data-tab="patients">Patienten</a>
      <a href="#" class="nav-tab" data-tab="bloodpressure">Blutdruck</a>
      <a href="#" class="nav-tab" data-tab="export">Export</a>
      <a href="#" class="nav-tab" data-tab="charts">Charts</a>
    </div>
  </nav>

  <main id="main-content">
    <!-- Schmerztagebuch Sektion -->
    <section id="tab-diary" class="tab-content" style="display:block;">
      <h2>Schmerztagebuch</h2>
      <form id="diaryForm" class="form-card">
        <div class="form-row">
          <div class="form-group">
            <label for="diaryDate">Datum</label>
            <input type="date" id="diaryDate" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="diarySeverity">Schmerzintensität (1-10)</label>
            <input type="number" id="diarySeverity" min="1" max="10" class="form-input" required>
          </div>
        </div>
        <div class="form-group full">
          <label for="diaryDescription">Beschreibung</label>
          <textarea id="diaryDescription" class="form-input" rows="4" placeholder="Was haben Sie heute erlebt?"></textarea>
        </div>
        <div class="form-group">
          <label>Begleitsymptome</label>
          <div class="checkbox-group">
            <label><input type="checkbox" name="symptom" value="Kopfschmerzen"> Kopfschmerzen</label>
            <label><input type="checkbox" name="symptom" value="Fieber"> Fieber</label>
            <label><input type="checkbox" name="symptom" value="Schwindel"> Schwindel</label>
            <label><input type="checkbox" name="symptom" value="Müdigkeit"> Müdigkeit</label>
            <label><input type="checkbox" name="symptom" value="Übelkeit"> Übelkeit</label>
          </div>
        </div>
        <button type="button" class="btn-primary" onclick="saveDiaryEntry()">Eintrag speichern</button>
      </form>
      <div id="diaryHistory" class="history-list"></div>
    </section>

    <!-- Medikamente Sektion -->
    <section id="tab-medication" class="tab-content" style="display:none;">
      <h2>Medikamentenplan</h2>
      <div class="form-card">
        <div class="form-group full">
          <label>Name des Medikaments</label>
          <input type="text" id="medName" class="form-input" placeholder="z.B. Paracetamol">
        </div>
        <div class="form-row">
          <div class="dose-time-col">
            <div class="dose-time-label" style="color:var(--morning)">☀️ Morgen</div>
            <input class="form-input dose-time-input" id="medMorning" type="number" min="0" max="20" step="0.5" placeholder="0" />
          </div>
          <div class="dose-time-col">
            <div class="dose-time-label" style="color:var(--noon)">☀️ Mittag</div>
            <input class="form-input dose-time-input" id="medNoon" type="number" min="0" max="20" step="0.5" placeholder="0" />
          </div>
          <div class="dose-time-col">
            <div class="dose-time-label" style="color:var(--evening)">☀️ Abend</div>
            <input class="
